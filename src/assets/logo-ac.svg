<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#915EFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#915EFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="20" cy="20" r="19" fill="none" stroke="#915EFF" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Inner circle background -->
  <circle cx="20" cy="20" r="17" fill="url(#bgGradient)"/>
  
  <!-- Letter A -->
  <path d="M 13 26 L 16 17 L 19 26 M 14.5 23 L 17.5 23" 
        fill="none" 
        stroke="white" 
        stroke-width="2.2" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Letter C -->
  <path d="M 28 17 C 26 15.5 23.5 15.5 22 17 C 20.5 18.5 20.5 21.5 22 23 C 23.5 24.5 26 24.5 28 23" 
        fill="none" 
        stroke="white" 
        stroke-width="2.2" 
        stroke-linecap="round"/>
</svg>
